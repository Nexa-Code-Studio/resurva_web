name: Deploy Resurva Frontend

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build Validation
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Next.js build
        env:
          NEXT_PUBLIC_API_URL: "https://api.resurva.my.id/api/v1"
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy (hanya jika build lulus)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          printf '%b' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via SSH
        id: deploy_step
        run: |
          DEPLOY_LOG=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH' 2>&1
            set -e

            echo "--- Masuk ke direktori project ---"
            cd /var/www/resurva/resurva_web

            echo "--- Git pull latest changes ---"
            git pull origin main

            echo "--- Install dependencies ---"
            npm install --quiet

            echo "--- Build Next.js app ---"
            NEXT_PUBLIC_API_URL=https://api.resurva.my.id/api/v1 npm run build

            echo "--- Restart service resurva-frontend ---"
            (pm2 restart resurva-frontend 2>/dev/null || sudo -n systemctl restart resurva-frontend 2>/dev/null || true)

            sleep 3

            echo "--- Verifikasi deployment ---"
            echo "Deploy frontend selesai."
          ENDSSH
          )

          echo "deploy_log<<EOF" >> $GITHUB_OUTPUT
          echo "$DEPLOY_LOG" | tail -20 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Calculate duration
        id: duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          DIFF=$((END - START))
          echo "value=${DIFF}s" >> $GITHUB_OUTPUT

      # ── Notifikasi Sukses ──────────────────────────────────────
      - name: Discord Notification — Deploy Success
        if: success()
        env:
          DISCORD_WEBHOOK: "https://discord.com/api/webhooks/1528030528954175621/8bmY2J_yx6zxbZyRuXGi3-ZkrcjcvMWhDJ9yz7YKlW0y1xp5siRUbn6vlgObH5OeZxX5"
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DURATION: ${{ steps.duration.outputs.value }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)

          PAYLOAD=$(jq -n \
            --arg short_sha "$SHORT_SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg actor "$ACTOR" \
            --arg branch "$BRANCH" \
            --arg run_url "$RUN_URL" \
            --arg commit_url "$COMMIT_URL" \
            --arg duration "$DURATION" \
            --arg timestamp "$TIMESTAMP" \
            --arg repo_name "$REPO_NAME" \
            '{
              username: "Resurva CI/CD",
              avatar_url: "http://172.93.219.133:9000/resurva-bucket/assets/kucing_plenger.jpeg",
              embeds: [{
                title: ("#" + $repo_name + " Deploy Berhasil"),
                description: ("> " + $commit_msg),
                color: 3908956,
                fields: [
                  {
                    name: "Branch",
                    value: ("`" + $branch + "`"),
                    inline: true
                  },
                  {
                    name: "Commit",
                    value: ("[`" + $short_sha + "`](" + $commit_url + ")"),
                    inline: true
                  },
                  {
                    name: "Duration",
                    value: ("`" + $duration + "`"),
                    inline: true
                  },
                  {
                    name: "Deployed by",
                    value: $actor,
                    inline: true
                  },
                  {
                    name: "Environment",
                    value: "`production`",
                    inline: true
                  },
                  {
                    name: "Log",
                    value: ("[Lihat detail di GitHub Actions](" + $run_url + ")"),
                    inline: false
                  }
                ],
                footer: {
                  text: ("Resurva Frontend · " + $repo_name),
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                timestamp: $timestamp
              }]
            }')

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ── Notifikasi Gagal ───────────────────────────────────────
      - name: Discord Notification — Deploy Failed
        if: failure()
        env:
          DISCORD_WEBHOOK: "https://discord.com/api/webhooks/1528030528954175621/8bmY2J_yx6zxbZyRuXGi3-ZkrcjcvMWhDJ9yz7YKlW0y1xp5siRUbn6vlgObH5OeZxX5"
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DURATION: ${{ steps.duration.outputs.value }}
          REPO: ${{ github.repository }}
          DEPLOY_LOG: ${{ steps.deploy_step.outputs.deploy_log }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"
          REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)

          LOG_SNIPPET=$(echo "$DEPLOY_LOG" | tail -15 | head -c 900)
          if [ -z "$LOG_SNIPPET" ]; then
            LOG_SNIPPET="Tidak ada log tersedia. Cek GitHub Actions untuk detail."
          fi

          PAYLOAD=$(jq -n \
            --arg short_sha "$SHORT_SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg actor "$ACTOR" \
            --arg branch "$BRANCH" \
            --arg run_url "$RUN_URL" \
            --arg commit_url "$COMMIT_URL" \
            --arg duration "$DURATION" \
            --arg timestamp "$TIMESTAMP" \
            --arg log_snippet "$LOG_SNIPPET" \
            --arg repo_name "$REPO_NAME" \
            '{
              username: "Resurva CI/CD",
              avatar_url: "http://172.93.219.133:9000/resurva-bucket/assets/kucing_plenger.jpeg",
              embeds: [{
                title: ("#" + $repo_name + " Deploy Gagal"),
                description: ("> " + $commit_msg),
                color: 15746887,
                fields: [
                  {
                    name: "Branch",
                    value: ("`" + $branch + "`"),
                    inline: true
                  },
                  {
                    name: "Commit",
                    value: ("[`" + $short_sha + "`](" + $commit_url + ")"),
                    inline: true
                  },
                  {
                    name: "Duration",
                    value: ("`" + $duration + "`"),
                    inline: true
                  },
                  {
                    name: "Triggered by",
                    value: $actor,
                    inline: true
                  },
                  {
                    name: "Environment",
                    value: "`production`",
                    inline: true
                  },
                  {
                    name: "Log terakhir",
                    value: ("```\n" + $log_snippet + "\n```"),
                    inline: false
                  },
                  {
                    name: "Detail lengkap",
                    value: ("[Buka GitHub Actions](" + $run_url + ")"),
                    inline: false
                  }
                ],
                footer: {
                  text: ("Resurva Frontend · " + $repo_name),
                  icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                timestamp: $timestamp
              }]
            }')

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
